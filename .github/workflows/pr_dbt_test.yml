name: dbt CI/CD Pipeline

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  dbt_build_and_test:
    name: Run dbt build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup dbt profiles
        # Cria a pasta oculta e o arquivo de conexao dentro da maquina virtual do GitHub
        run: |
          mkdir -p ~/.dbt
          echo "futebol_analytics:
            target: dev
            outputs:
              dev:
                type: databricks
                catalog: workspace_project
                schema: gold
                host: ${{ secrets.DATABRICKS_HOST }}
                http_path: ${{ secrets.DATABRICKS_HTTP_PATH }}
                token: ${{ secrets.DATABRICKS_TOKEN }}
                threads: 4" > ~/.dbt/profiles.yml

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dbt-databricks==1.11.5

      - name: Install dbt Packages
        working-directory: ./futebol_analytics
        run: dbt deps

      - name: Execute dbt build
        working-directory: ./futebol_analytics
        run: dbt build --target dev