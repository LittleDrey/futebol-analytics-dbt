# Governança Ativa (tests Automatizados de Qualidade)
# Conceito Aplicado: Shift Left Testing - tests (Accuracy, Completeness, Uniqueness) 
# Serão parte inerente da esteira

version: 2

models:
  - name: dim_times
    description: "Tabela Dimensional SCD Type 1 com o cadastro de Times"
    columns:
      - name: team_sk
        description: "Chave Substituta primária"
        tests:
          - unique
          - not_null

  - name: dim_torneios
    description: "Tabela Dimensional com histórico de Temporadas (SCD Type 2)"
    columns:
      - name: tournament_sk
        tests:
          - unique
          - not_null

  - name: fct_partidas
    description: "Fato Principal contendo resultados de partidas"
    columns:
      - name: match_sk
        tests:
          - unique
          - not_null
      - name: home_team_sk
        tests:
          - not_null
        #  - relationships: # Teste de Integridade Referencial (Accuracy)
        #      arguments:
        #        to: ref('dim_times')
        #        field: team_sk 

      - name: match_season_year
        tests:
          - not_null
          - accepted_values: # Teste de Validade (Validity)
              arguments:
                values: [2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024]

# ----------------------------------------------------
# TABELAS GERADAS VIA CODEGEN (COM TESTES INJETADOS)
# ----------------------------------------------------

  - name: fct_eventos
    description: "Fato Secundário contendo eventos de partidas"
    columns:
      - name: event_sk
        data_type: int
        description: "PK Hash do Evento"
        tests:
          - unique
          - not_null

      - name: match_sk
        data_type: int
        description: "FK Hash para Fato Principal de Partidas"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_partidas')
                field: match_sk

      - name: team_sk
        data_type: int
        description: "FK para Dimensão de Times"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_times')
                field: team_sk

      - name: player_sk
        data_type: int
        description: "FK para Dimensão de Jogadores"
        tests:
          # Removido 'not_null': Eventos podem ser do time/técnico
          - relationships:
              arguments:
                to: ref('dim_jogadores')
                field: player_sk
                config:
                  severity: warn # <--- Permite que o pipeline continue, gerando apenas um alerta

      - name: assist_player_sk
        data_type: int
        description: "FK para Dimensão de Jogadores (Assistente)"
        tests:
          # Removido 'not_null': Nem todo evento tem assistência
          - relationships:
              arguments:
                to: ref('dim_jogadores')
                field: player_sk
                config:
                  severity: warn # <--- Permite que o pipeline continue, gerando apenas um alerta

      - name: match_src_id # <--- CORRIGIDO DE match_id PARA match_src_id
        data_type: int
        description: "ID Original da Partida"
        tests:
          - not_null

      - name: match_minute_abs
        data_type: int 
        description: "Minuto Absoluto do Evento na Partida"
        tests:
          - not_null

      - name: extra_time
        data_type: int
        description: "Minutos de Acréscimo do Evento"
        tests:
          - not_null

      - name: event_type
        data_type: string
        description: "Tipo do Evento (Gol, Assistência, Cartão, etc)"

      - name: event_detail
        data_type: string
        description: "Detalhes do Evento"

      - name: comments
        data_type: string
        description: "Comentários Adicionais Sobre o Evento"

      - name: silver_ingestion_date
        data_type: timestamp
        description: "Data de Ingestão na Camada Silver"

      - name: gold_ingestion_date
        data_type: timestamp
        description: "Data de Ingestão na Camada Gold"

  - name: dim_jogadores
    description: "Dimensão de Jogadores com detalhes dos Atletas"
    columns:
      - name: player_sk
        data_type: int
        description: "PK Hash do Jogador"
        tests:
          - unique
          - not_null

      - name: player_id
        data_type: int
        description: "ID Original do Jogador"
        tests:
          - not_null
          - unique

      - name: player_age
        data_type: bigint
        description: "Idade do Jogador"
            
      - name: player_firstname
        data_type: string
        description: "Primeiro Nome do Jogador"

      - name: player_lastname
        data_type: string
        description: "Sobrenome do Jogador"

      - name: player_name
        data_type: string
        description: "Nome Completo do Jogador"

      - name: is_injured
        data_type: boolean
        description: "Indica se o Jogador Está Lesionado"

      - name: player_birth_date
        data_type: date
        description: "Data de Nascimento do Jogador"

      - name: player_country
        data_type: string
        description: "País de Origem do Jogador"

      - name: player_place
        data_type: string
        description: "Cidade Natal do Jogador"

      - name: player_height_cm
        data_type: int
        description: "Altura do Jogador em Centímetros"

      - name: player_weight_kg
        data_type: int
        description: "Peso do Jogador em Quilogramas"

      - name: source_file
        data_type: string
        description: "Nome do Arquivo de Origem dos Dados do Jogador"

      - name: ingestion_date
        data_type: timestamp
        description: "Data de Ingestão dos Dados do Jogador"

      - name: player_nationality
        data_type: string
        description: "Nacionalidade do Jogador"

      - name: gold_ingestion_date
        data_type: timestamp
        description: "Data de Ingestão na Camada Gold"

  - name: dim_estadios
    description: "Dimensão de Estádios com detalhes dos Palcos de Jogo"
    columns:
      - name: stadium_sk
        data_type: int
        description: "PK Hash do Estádio"
        tests:
          - unique
          - not_null

      - name: stadium_id
        data_type: int
        description: "ID Original do Estádio"
        tests:
          - not_null
          - unique

      - name: stadium_name
        data_type: string
        description: "Nome do Estádio"

      - name: stadium_city
        data_type: string
        description: "Cidade onde o Estádio está localizado"

      - name: stadium_state
        data_type: string
        description: "Estado onde o Estádio está localizado"

      - name: stadium_road
        data_type: string
        description: "Endereço do Estádio"

      - name: stadium_district
        data_type: string
        description: "Bairro onde o Estádio está localizado"

      - name: stadium_capacity
        data_type: int
        description: "Capacidade de Público do Estádio"

      - name: stadium_surface
        data_type: string
        description: "Tipo de Gramado do Estádio"

      - name: source_file
        data_type: string
        description: "Nome do Arquivo de Origem dos Dados do Estádio"

      - name: ingestion_date
        data_type: timestamp
        description: "Data de Ingestão dos Dados do Estádio"

      - name: gold_ingestion_date
        data_type: timestamp
        description: "Data de Ingestão na Camada Gold"